version: '3.8'

services:
  php:
    build: .
    volumes:
      - .:/var/www/html
    networks:
      - vite_gourmand_network

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - vite_gourmand_network

  mariadb:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vite_gourmand
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    ports:
      - "3306:3306"
    networks:
      - vite_gourmand_network

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    networks:
      - vite_gourmand_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mariadb
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mariadb
    networks:
      - vite_gourmand_network

networks:
  vite_gourmand_network:
    driver: bridge